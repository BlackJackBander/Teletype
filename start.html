<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleType Editor - Документы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #222;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #4a90e2;
        }
        
        .documents-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #444;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        
        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .document-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        
        .document-card:hover {
            border-color: #4a90e2;
        }
        
        .document-card.new {
            background: #f8f9fa;
            border: 2px dashed #ddd;
            text-align: center;
            color: #4a90e2;
            font-weight: 500;
        }
        
        .document-card.new:hover {
            border-color: #4a90e2;
            background: #f0f7ff;
        }
        
        .document-title {
            font-size: 15px;
            font-weight: 500;
            color: #222;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .document-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover {
            border-color: #4a90e2;
            color: #4a90e2;
        }
        
        .btn-primary {
            background: #4a90e2;
            border-color: #4a90e2;
            color: white;
        }
        
        .btn-primary:hover {
            background: #3a80d2;
            border-color: #3a80d2;
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a90e2;
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }
            
            .documents-grid {
                grid-template-columns: 1fr;
            }
            
            .actions {
                flex-direction: column;
            }
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        }
        
        .modal-header {
            margin-bottom: 20px;
        }
        
        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: #222;
        }
        
        .modal-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .modal-input:focus {
            outline: none;
            border-color: #4a90e2;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        /* Футер */
.footer {
    margin-top: 40px;
    padding: 20px 0;
    border-top: 1px solid var(--border-primary);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-size: 12px;
}

.footer-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px;
}

.footer-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.footer-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.footer-text {
    color: var(--text-tertiary);
}

.footer-link {
    color: var(--accent-primary);
    text-decoration: none;
    transition: color 0.3s ease;
}

.footer-link:hover {
    color: var(--accent-secondary);
    text-decoration: underline;
}

.footer-separator {
    color: var(--text-tertiary);
}

@media (max-width: 600px) {
    .footer-content {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }
    
    .footer-left {
        align-items: center;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 TeleType Editor</h1>
            <p>Выберите документ для редактирования</p>
        </div>
        
        <div class="search-box">
            <input type="text" class="search-input" placeholder="Поиск документов..." id="searchInput">
        </div>
        
        <div class="documents-section">
            <div class="section-title">Мои документы</div>
            <div class="documents-grid" id="documentsList">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>Загрузка документов...</div>
                </div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" id="newDocumentBtn">
                + Новый документ
            </button>
            <button class="btn" id="importBtn">
                📁 Импорт HTML
            </button>
        </div>
    </div>
    
    <!-- Модальное окно для создания документа -->
    <div class="modal" id="newDocModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новый документ</h3>
            </div>
            <input type="text" class="modal-input" id="newDocTitle" placeholder="Введите название документа">
            <div class="modal-actions">
                <button class="btn" id="cancelBtn">Отмена</button>
                <button class="btn btn-primary" id="createDocBtn">Создать</button>
            </div>
        </div>
    </div>
    
    <script src="start.js"></script>

        <!-- Футер с информацией -->
<footer class="footer">
    <div class="container">
        <div class="footer-content">
            <div class="footer-left">
                <span class="footer-text">© 2025 TeleType Editor v1.2</span>
                <span class="footer-text">Разработано с ❤️ для Firefox</span>
            </div>
            <div class="footer-right">
                <a href="https://github.com/blackjackbander" class="footer-link" target="_blank">О разработчике</a>
                <span class="footer-separator">•</span>
                <a href="mailto:6erhltzvs@mozmail.com" class="footer-link">Обратная связь</a>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
